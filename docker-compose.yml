services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    environment:
      - PHP_OPCACHE_ENABLE=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gateway

  nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gateway

  db:
    image: mysql:8.0
    container_name: gateway_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gateway
      MYSQL_USER: gateway
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gateway

  redis:
    image: redis:7-alpine
    container_name: gateway_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gateway

networks:
  gateway:
    driver: bridge

volumes:
  db_data:
  vendor_data:
